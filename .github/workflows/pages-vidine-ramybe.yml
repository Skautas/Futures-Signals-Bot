# Kelia tik statinį turinį į šaką gh-pages (be configure-pages / be „GitHub Actions“ šaltinio).
#
# Po pirmo sėkmingo paleidimo: Settings → Pages → Source: „Deploy from a branch“
# → Branch: gh-pages → Folder: / (root) → Save.
#
# Svetainė: https://skautas.github.io/Futures-Signals-Bot/
name: Deploy Vidinė ramybė (gh-pages)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docs/vidine-ramybe/**"
      - ".github/workflows/pages-vidine-ramybe.yml"

permissions:
  contents: write

concurrency:
  group: pages-gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs/vidine-ramybe
          branch: gh-pages
          clean: true
