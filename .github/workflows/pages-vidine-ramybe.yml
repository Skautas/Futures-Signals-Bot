# Kelia tik statinį turinį į šaką gh-pages (be configure-pages / be „GitHub Actions“ šaltinio).
#
# Po pirmo sėkmingo paleidimo: Settings → Pages → Source: „Deploy from a branch“
# → Branch: gh-pages → Folder: / (root) → Save.
#
# Svetainė: https://skautas.github.io/Futures-Signals-Bot/
name: Deploy Vidinė ramybė (gh-pages)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docs/vidine-ramybe/**"
      - ".github/workflows/pages-vidine-ramybe.yml"

permissions:
  contents: write

concurrency:
  group: pages-gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs/vidine-ramybe
          branch: gh-pages
          clean: true

      - name: Pages nustatymas (santrauka)
        if: success()
        run: |
          echo "## Jei svetainė naršyklėje vis dar neatsidaro" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Ši eiga tik **įkelia failus** į šaką \`gh-pages\`. Puslapis veiks tik įjungus **GitHub Pages**:" >> "$GITHUB_STEP_SUMMARY"
          echo "1. **Settings → Pages**" >> "$GITHUB_STEP_SUMMARY"
          echo "2. **Source:** **Deploy from a branch**" >> "$GITHUB_STEP_SUMMARY"
          echo "3. **Branch:** \`gh-pages\`, aplankas **/(root)** → **Save**" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Palaukite **1–10 min.**: https://skautas.github.io/Futures-Signals-Bot/" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Daugiau: **PAGES_SETUP.md** repozitorijos šaknyje." >> "$GITHUB_STEP_SUMMARY"
