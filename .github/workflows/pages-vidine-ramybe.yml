# Publikuoja Vidinės Ramybės Mokykla statinę svetainę į GitHub Pages.
# Po push: Settings → Pages → Build: „GitHub Actions“ (ne branch).
# Vieša nuoroda: https://skautas.github.io/Futures-Signals-Bot/
name: Deploy Vidinė ramybė (Pages)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docs/vidine-ramybe/**"
      - ".github/workflows/pages-vidine-ramybe.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/vidine-ramybe

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
